services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=blocapp'
      - 'POSTGRES_PASSWORD=blocapp'
      - 'POSTGRES_USER=blocapp'
    ports:
      - '5551:5432'
    networks:
      - bloco_network
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    networks:
      - bloco_network
  adminer:
    image: 'adminer'
    container_name: 'adminer_gui'
    ports:
      - '6444:8080'
    environment:
      - ADMINER_DESIGN=nette
    depends_on:
      - postgres
    networks:
      - bloco_network

networks:
  bloco_network:
    driver: bridge

volumes:
  db-data: